<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports - SmartCampus Connect</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="main-header">
        <h1>SmartCampus Connect</h1>
        <nav class="main-nav">
            <a href="index.html">Dashboard</a>
            <a href="students.html">Students</a>
            <a href="courses.html">Courses</a>
            <a href="library.html">Library</a>
            <a href="notifications.html">Notifications</a>
            <a href="reports.html" class="active">Reports</a>
            <a href="soap.html">SOAP Demo</a>
        </nav>
    </header>
    
    <div id="toast-container"></div>
    
    <main class="container">
        <div class="grid">
            <div class="card">
                <h2>Generate Reports</h2>
                <p style="margin-bottom: 1rem; color: #666;">Fetch aggregated data from across the distributed microservices.</p>
                
                <div style="display: flex; flex-direction: column; gap: 10px;">
                    <button onclick="fetchReport('student')" id="btn-student">Student Report</button>
                    <button onclick="fetchReport('enrolment')" id="btn-enrolment">Enrolment Report</button>
                    <button onclick="fetchReport('library')" id="btn-library">Library Report</button>
                    <button onclick="fetchReport('campus')" id="btn-campus">Campus Overview</button>
                </div>
            </div>
            
            <div class="card" style="grid-column: span 2;">
                <h2>Report Output</h2>
                <div id="reportLoader" class="loader"></div>
                <pre id="reportOutput">Select a report from the menu to view the data.</pre>
            </div>
        </div>
    </main>
    
    <script src="js/common.js"></script>
    <script src="js/reports.js"></script>
</body>
</html>
