<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Courses - SmartCampus Connect</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="main-header">
        <h1>SmartCampus Connect</h1>
        <nav class="main-nav">
            <a href="index.html">Dashboard</a>
            <a href="students.html">Students</a>
            <a href="courses.html" class="active">Courses</a>
            <a href="library.html">Library</a>
            <a href="notifications.html">Notifications</a>
            <a href="reports.html">Reports</a>
            <a href="soap.html">SOAP Demo</a>
        </nav>
    </header>
    
    <div id="toast-container"></div>
    
    <main class="container">
        <div class="grid">
            <div class="card">
                <h2>Create Course</h2>
                <form id="course-form">
                    <div class="form-group">
                        <label>Course Code</label>
                        <input type="text" id="courseCode" required placeholder="e.g. DAD101">
                    </div>
                    <div class="form-group">
                        <label>Course Name</label>
                        <input type="text" id="courseName" required>
                    </div>
                    <div class="form-group">
                        <label>Programme</label>
                        <input type="text" id="programme" required placeholder="e.g. BITP">
                    </div>
                    <div class="form-group">
                        <label>Capacity</label>
                        <input type="number" id="capacity" min="1" required>
                    </div>
                    <button type="submit" id="courseSubmitBtn">Create Course</button>
                </form>
            </div>
            
            <div class="card">
                <h2>Enrol Student</h2>
                <form id="enrol-form">
                    <div class="form-group">
                        <label>Student ID</label>
                        <input type="number" id="enrolStudentId" required placeholder="Numeric ID from Students page">
                    </div>
                    <div class="form-group">
                        <label>Course ID</label>
                        <input type="number" id="enrolCourseId" required placeholder="Numeric ID from Courses table">
                    </div>
                    <div class="form-group">
                        <label>Semester</label>
                        <input type="text" id="enrolSemester" required placeholder="e.g. 2026/2027 SEM1">
                    </div>
                    <button type="submit" id="enrolSubmitBtn">Enrol</button>
                </form>
            </div>
            
            <div class="card" style="grid-column: 1 / -1;">
                <h2>View Courses</h2>
                <button onclick="loadCourses()" style="margin-bottom: 10px;">Refresh List</button>
                <div id="courseLoader" class="loader"></div>
                <div style="overflow-x: auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Code</th>
                                <th>Name</th>
                                <th>Programme</th>
                                <th>Capacity</th>
                                <th>Enrolled</th>
                            </tr>
                        </thead>
                        <tbody id="courseTableBody">
                            <!-- Rows will be injected here -->
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="card" style="grid-column: 1 / -1;">
                <h2>View Enrolments</h2>
                <button onclick="loadEnrolments()" style="margin-bottom: 10px;">Refresh Enrolments</button>
                <div id="enrolLoader" class="loader"></div>
                <div style="overflow-x: auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Student ID</th>
                                <th>Course ID</th>
                                <th>Semester</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="enrolTableBody">
                            <!-- Rows will be injected here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
    
    <script src="js/common.js"></script>
    <script src="js/courses.js"></script>
</body>
</html>
